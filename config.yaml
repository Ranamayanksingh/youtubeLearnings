# LLM Configuration
# Provider and model are read from .env (LLM_PROVIDER, CLAUDE_MODEL, GEMINI_MODEL).
# This file only sets fallback defaults — prefer configuring via .env.

llm:
  default_provider: "claude"

  claude:
    default_model: "claude-sonnet-4-6"

  gemini:
    default_model: "gemini-2.0-flash"
